framework:
    rate_limiter:
        # Login : 5 tentatives max par 15 min par IP
        login:
            policy: 'sliding_window'
            limit: 5
            interval: '15 minutes'

        # API check-email : 10 appels max par minute par IP
        api_check:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'

        # Mot de passe oublié : 3 demandes max par heure par IP
        forgot_password:
            policy: 'sliding_window'
            limit: 3
            interval: '1 hour'

        # Inscription : 3 max par heure par IP
        registration:
            policy: 'sliding_window'
            limit: 3
            interval: '1 hour'