framework:
    secret: '%env(APP_SECRET)%'
    default_locale: fr
    handle_all_throwables: true
    session:
        handler_id: null
        cookie_secure: true
        cookie_httponly: true
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native
    php_errors:
        log: true
    csrf_protection: true
    http_method_override: false
    property_info:
        with_constructor_extractor: true